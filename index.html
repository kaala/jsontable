<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON TABLE EDITOR</title>
  <script src="https://cdn.jsdelivr.net/npm/handsontable@18.0.0/dist/handsontable.full.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@18.0.0/styles/ht-theme-classic.min.css">
  <script src="src/json-table.js"></script>
  <style>body { padding: 8px; font: 13px monospace; }</style>
</head>
<body>
<div id="json-table-app"></div>
<script>
var jt = new JsonTable('#json-table-app',
  { name: 'Example', count: 42, items: [{ id: 1, label: 'First' }, { id: 2, label: 'Second' }] },
  { type: 'object', properties: { name: { type: 'string' }, count: { type: 'integer' }, items: { type: 'array', items: { type: 'object', properties: { id: { type: 'integer' }, label: { type: 'string' } } } } } }
);
</script>
</body>
</html>
