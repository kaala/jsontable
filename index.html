<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON TABLE EDITOR</title>
  <script src="https://cdn.jsdelivr.net/npm/handsontable@14.6.0/dist/handsontable.full.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@14.6.0/dist/handsontable.full.min.css">
  <style>
    body { padding: 8px; font: 13px monospace; }
    .slot { margin: 8px; border-left: 1px solid #ddd; padding-left: 12px; }
    .slot-root { border-left: 0; padding-left: 0; }
    .slot-head { margin: 4px; }
    .slot-path { font-weight: bold; margin-right: 16px; }
    .slot-txt { width: 600px; height: 200px; font: 13px monospace; resize: both; overflow-x: auto; white-space: pre; }
    .btn { cursor: pointer; padding: 0 4px; background: #eee; font: 13px monospace; user-select: none; }
    .btn.active { background: #00f; color: #fff; }
    .handsontable td { white-space: nowrap; font: 13px monospace; line-height: 21px; }
    .cell-txt { padding-right: 16px; }
    .cell-btn { float: right; position: relative; line-height: 21px; z-index: 10; }
  </style>
</head>
<body>
<div id="app"></div>
<template id="slot-template">
  <div class="slot">
    <div class="slot-head">
      <span class="slot-path"></span>
      <span class="btn btn-table">TABLE</span>
      <span class="btn btn-text">TEXT</span>
      <span class="btn btn-raw">RAW</span>
      <span class="btn btn-collapse">[-]</span>
    </div>
    <div class="slot-body">
      <div class="slot-hot"></div>
      <textarea class="slot-txt slot-txt-text"></textarea>
      <textarea class="slot-txt slot-txt-raw"></textarea>
    </div>
    <div class="slot-children"></div>
  </div>
</template>
<script>
// ============================================================
// 1. Helpers
// ============================================================
function tryParse(s) {
  try { return JSON.parse(s); } catch (e) { return s; }
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
                   .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function typeOf(v) {
  if (v === undefined) return 'undefined';
  if (v === null) return 'null';
  if (Array.isArray(v)) {
    if (v.length > 0 && v.every(function (it) { return Array.isArray(it); })) return 'matrix';
    return 'array';
  }
  return typeof v;
}

function formatJSON(v) {
  var t = typeOf(v);
  var lines;
  if (t === 'object') {
    var keys = Object.keys(v);
    if (keys.length === 0) return '{}';
    lines = keys.map(function (k) { return `${JSON.stringify(k)}: ${JSON.stringify(v[k])}`; });
    return `{\n${lines.join(',\n')}\n}`;
  }
  if (t === 'array' || t === 'matrix') {
    if (v.length === 0) return '[]';
    lines = v.map(function (it) { return JSON.stringify(it); });
    return `[\n${lines.join(',\n')}\n]`;
  }
  return JSON.stringify(v);
}

function pathString(path) {
  if (!path || !path.length) return '';
  var s = path[0];
  for (var i = 1; i < path.length; i++) {
    var seg = path[i];
    if (typeof seg === 'number') s += '[' + seg + ']';
    else if (Array.isArray(seg)) s += '[' + seg.join('][') + ']';
    else s += '.' + seg;
  }
  return s;
}

function getSchema(path) {
  var schema = S.root.$schema;
  if (!schema || typeof schema !== 'object') return null;
  if (path[0] !== 'root' || path.length < 2) return null;
  if (path[1] === '$schema') return null;
  for (var i = 2; i < path.length; i++) {
    var seg = path[i];
    if (typeof seg === 'number') {
      if (schema.type !== 'array' || !schema.items) return null;
      schema = schema.items;
    } else if (Array.isArray(seg)) {
      for (var j = 0; j < seg.length; j++) {
        if (schema.type !== 'array' || !schema.items) return null;
        schema = schema.items;
      }
    } else {
      if (!schema.properties || !schema.properties[seg]) return null;
      schema = schema.properties[seg];
    }
  }
  return schema;
}

function mergeSchemas(list) {
  var types = [];
  var hasNull = false;
  var mergedProps = {};
  var allObj = true;

  list.forEach(function (s) {
    if (s.type === 'null') { hasNull = true; return; }
    if (s.type && types.indexOf(s.type) === -1) types.push(s.type);
    if (s.type !== 'object') allObj = false;
    if (s.properties) {
      Object.keys(s.properties).forEach(function (k) {
        if (!mergedProps[k]) mergedProps[k] = [];
        mergedProps[k].push(s.properties[k]);
      });
    }
  });

  if (allObj && Object.keys(mergedProps).length > 0) {
    var props = {};
    Object.keys(mergedProps).forEach(function (k) {
      props[k] = mergeSchemas(mergedProps[k]);
    });
    return { type: 'object', properties: props };
  }

  if (hasNull) types.push('null');
  if (types.length === 0) return {};
  if (types.length === 1) return { type: types[0] };
  return { type: types };
}

function inferSchema(value) {
  var t = typeOf(value);
  if (t === 'object') {
    var props = {};
    Object.keys(value).forEach(function (k) {
      props[k] = inferSchema(value[k]);
    });
    return { type: 'object', properties: props };
  }
  if (t === 'array' || t === 'matrix') {
    if (value.length === 0) return { type: 'array', items: {} };
    return { type: 'array', items: mergeSchemas(value.map(function (v) { return inferSchema(v); })) };
  }
  if (t === 'number') return { type: Number.isInteger(value) ? 'integer' : 'number' };
  return { type: t };
}

function enhanceSchema(schema, raw) {
  var t = typeOf(raw);
  var xs;
  if (t === 'object') {
    if (!schema.properties) schema.properties = {};
    var keys = Object.keys(raw || {});
    keys.forEach(function (k) {
      if (!schema.properties[k]) schema.properties[k] = inferSchema(raw[k]);
    });
    Object.keys(schema.properties).forEach(function (k) {
      if (keys.indexOf(k) === -1) keys.push(k);
    });
    xs = { type: 'obj', keys: keys, coldef: {} };
    keys.forEach(function (k) {
      if (raw[k] !== undefined) enhanceSchema(schema.properties[k], raw[k]);
    });
  } else if (t === 'array' || t === 'matrix') {
    xs = { type: t === 'matrix' ? 'mat' : 'arr', coldef: {} };
    if (!schema.items) schema.items = { type: 'object', properties: {} };
    var items = schema.items;
    if (!items.properties) items.properties = {};
    var itemKeys = Object.keys(items.properties);
    raw.forEach(function (it) {
      if (it) Object.keys(it).forEach(function (k) {
        if (itemKeys.indexOf(k) === -1) {
          itemKeys.push(k);
          items.properties[k] = inferSchema(it[k]);
        }
      });
    });
    if (itemKeys.length > 0) {
      itemKeys.forEach(function (k) {
        var sampleVal;
        for (var si = 0; si < raw.length; si++) {
          if (raw[si] && k in raw[si]) { sampleVal = raw[si][k]; break; }
        }
        enhanceSchema(items.properties[k], sampleVal);
      });
      items['x-schema'] = { type: 'obj', keys: itemKeys, obj: true, coldef: {} };
    }
  } else if (t === 'number') {
    xs = { type: Number.isInteger(raw) ? 'int' : 'num', coldef: {} };
  } else if (t === 'boolean') {
    xs = { type: 'bool', coldef: { type: 'dropdown', source: ['true', 'false'], allowInvalid: false } };
  } else if (t === 'null') {
    xs = { type: 'any', coldef: {} };
  } else {
    xs = { type: 'str', coldef: {} };
  }
  schema['x-schema'] = xs;
}

// ============================================================
// 2. Handsontable layer
// ============================================================
function makeHot(div, cfg) {
  return new Handsontable(div, Object.assign({
    licenseKey: 'non-commercial-and-evaluation',
    editor: 'text',
    renderer: cellRenderer,
    width: 'auto', height: 'auto',
    manualColumnResize: true,
    outsideClickDeselects: false, contextMenu: false,
  }, cfg));
}

function cellRenderer(hot, td, row, col, prop, value, cellProperties) {
  Handsontable.renderers.TextRenderer.apply(this, arguments);
  if (value == null || value === '') { td.innerHTML = ''; return; }
  var expanded = !!cellProperties._expanded;
  var display = value;
  var title = '';
  if (value.length > 40) {
    display = `${value.slice(0, 40)}...`;
    title = formatJSON(tryParse(value));
  }
  td.title = title;
  if (expanded) {
    td.innerHTML = `<span class="btn cell-btn active">[-]</span><span class="cell-txt">${esc(display)}</span>`;
    td.querySelector('.cell-btn').addEventListener('mousedown', function (e) {
      e.stopPropagation(); e.preventDefault();
      collapseCell(hot, row, col);
    });
  } else {
    td.innerHTML = `<span class="btn cell-btn">[+]</span><span class="cell-txt">${esc(display)}</span>`;
    td.querySelector('.cell-btn').addEventListener('mousedown', function (e) {
      e.stopPropagation(); e.preventDefault();
      expandCell(hot, row, col);
    });
  }
}

// ============================================================
// 3. Slot — create
// ============================================================
function createSlot(parentEl, opts) {
  var tpl = document.getElementById('slot-template');
  var el = tpl.content.cloneNode(true).querySelector('.slot');
  if (opts.isRoot) el.classList.add('slot-root');

  el._path = opts.path || [];
  el.querySelector('.slot-path').textContent = pathString(el._path);
  el._raw  = opts.raw;
  el._type = opts.type;
  el._parentRow = opts.parentRow;
  el._parentCol = opts.parentCol;
  el._parentHot = opts.parentHot;

  var head = el.querySelector('.slot-head');
  el._btnTable = head.querySelector('.btn-table');
  el._btnText  = head.querySelector('.btn-text');
  el._btnRaw   = head.querySelector('.btn-raw');
  el._btnCollapse = head.querySelector('.btn-collapse');

  var isStringType = opts.type === 'string';
  el._btnTable.style.display = opts.showTable ? '' : 'none';
  el._btnText.style.display  = isStringType ? '' : 'none';
  el._btnRaw.style.display   = '';
  el._btnCollapse.style.display = opts.noCollapse ? 'none' : '';

  el._btnTable.addEventListener('mousedown', function (e) { e.preventDefault(); switchView(el, 'table'); });
  el._btnText.addEventListener('mousedown',  function (e) { e.preventDefault(); switchView(el, 'text'); });
  el._btnRaw.addEventListener('mousedown',   function (e) { e.preventDefault(); switchView(el, 'raw'); });
  el._btnCollapse.addEventListener('mousedown', function (e) { e.preventDefault(); saveSlot(el); destroySlot(el); });

  el._hot = null;
  el._view = '';
  el._hotDiv   = el.querySelector('.slot-hot');
  el._textTA   = el.querySelector('.slot-txt-text');
  el._rawTA    = el.querySelector('.slot-txt-raw');
  el._children = el.querySelector('.slot-children');

  var container = parentEl || document.getElementById('app');
  var kids = container.querySelectorAll(':scope > .slot');
  var inserted = false;
  for (var i = 0; i < kids.length; i++) {
    var kid = kids[i];
    if (kid._parentRow > el._parentRow || (kid._parentRow === el._parentRow && kid._parentCol > el._parentCol)) {
      container.insertBefore(el, kid);
      inserted = true;
      break;
    }
  }
  if (!inserted) container.appendChild(el);
  return el;
}

// ============================================================
// 4. Slot — view
// ============================================================
function switchView(el, view) {
  if (el._view === view) return;
  saveSlot(el);
  if (el._view === 'table' && el._hot) {
    clearChildren(el);
    el._hot.destroy();
    el._hot = null;
  }

  el._hotDiv.style.display = 'none';
  el._textTA.style.display = 'none';
  el._rawTA.style.display = 'none';

  if (view === 'table') {
    el._hotDiv.style.display = 'block';
    el._hot = buildHot(el);
  }
  if (view === 'text') {
    el._textTA.style.display = 'block';
    el._textTA.value = String(el._raw);
  }
  if (view === 'raw') {
    el._rawTA.style.display = 'block';
    var t = typeOf(el._raw);
    if (t === 'object' || t === 'array' || t === 'matrix') {
      el._rawTA.value = formatJSON(el._raw);
    } else {
      el._rawTA.value = JSON.stringify(el._raw);
    }
  }

  el._view = view;
  el._btnTable.classList.toggle('active', view === 'table');
  el._btnText.classList.toggle('active', view === 'text');
  el._btnRaw.classList.toggle('active', view === 'raw');
}

// ============================================================
// 5. Slot — hot I/O
// ============================================================
// --- data layer (no DOM) ---

// resolveSchema — getSchema by path, fallback to inferSchema, then enhance
function resolveSchema(path, raw) {
  var schema = getSchema(path) || inferSchema(raw);
  if (schema) enhanceSchema(schema, raw);
  return schema;
}

// schemaCols — build typed headers + column configs from schema properties
function schemaCols(props, keys) {
  var headers = [];
  var columns = [];
  for (var i = 0; i < keys.length; i++) {
    var pxs = props[keys[i]]['x-schema'];
    headers.push(keys[i] + ' (' + pxs.type + ')');
    columns.push(pxs.coldef);
  }
  return { headers: headers, columns: columns };
}

// buildObjectConfig — single row, schema keys as columns
function buildObjectConfig(path, raw) {
  var schema = resolveSchema(path, raw);
  var xs = schema && schema['x-schema'];
  var keys = (xs && xs.keys) ? xs.keys.slice() : Object.keys(raw || {});
  var props = schema ? schema.properties : {};
  var cols = schemaCols(props, keys);
  return {
    keys: keys,
    hot: {
      data: [keys.map(function (k) { return JSON.stringify(k in raw ? raw[k] : null); })],
      colHeaders: cols.headers,
      columns: cols.columns
    }
  };
}

// buildMatrixConfig — multi-row, multi-col, JSON.stringify per cell
function buildMatrixConfig(raw) {
  return {
    keys: null,
    hot: {
      data: raw.map(function (row) {
        return row.map(function (cell) { return JSON.stringify(cell); });
      }),
      colHeaders: true, rowHeaders: true,
      manualRowMove: true, minSpareRows: 2, minSpareCols: 3
    }
  };
}

// buildArrayConfig — object-array -> multi-col; otherwise single-col
function buildArrayConfig(path, raw) {
  if (raw.length === 0) {
    return {
      keys: null,
      hot: {
        data: [['']],
        colHeaders: true, rowHeaders: true,
        manualRowMove: true, minSpareRows: 2
      }
    };
  }
  var schema = resolveSchema(path, raw);
  var itemSchema = null;
  if (schema && schema.type === 'array' && schema.items && typeof schema.items === 'object') {
    itemSchema = schema.items;
  }
  var xs = itemSchema && itemSchema['x-schema'];
  var isObjArray = (xs && xs.obj) || (
    raw.length > 0 && raw.every(function (it) {
      return it != null && typeof it === 'object' && !Array.isArray(it);
    })
  );
  if (isObjArray) {
    var keys = (xs && xs.keys) || [];
    var props = itemSchema ? itemSchema.properties : {};
    var cols = schemaCols(props, keys);
    return {
      keys: keys,
      hot: {
        data: raw.map(function (it) {
          return keys.map(function (k) { return JSON.stringify(it && k in it ? it[k] : null); });
        }),
        colHeaders: cols.headers, rowHeaders: true,
        columns: cols.columns,
        manualRowMove: true, minSpareRows: 2
      }
    };
  }
  var arrData = raw.map(function (it) { return [JSON.stringify(it)]; });
  return {
    keys: null,
    hot: {
      data: arrData,
      colHeaders: true, rowHeaders: true,
      manualRowMove: true, minSpareRows: 2
    }
  };
}

// --- DOM layer ---

// buildHot — dispatch by type, create Hot, set el._keys, attach hooks
function buildHot(el) {
  var type = el._type;
  var path = el._path;
  var raw = el._raw;
  var cfg;

  if (type === 'object') {
    cfg = buildObjectConfig(path, raw);
  } else if (type === 'matrix') {
    cfg = buildMatrixConfig(raw);
  } else if (type === 'array') {
    cfg = buildArrayConfig(path, raw);
  } else {
    cfg = { keys: null, hot: { data: [[JSON.stringify(raw)]] } };
  }

  el._keys = cfg.keys;
  var hot = makeHot(el._hotDiv, cfg.hot);

  hot.addHook('beforeChange', function (changes, source) {
    if (source === 'loadData' || source === 'cascade') return;
    changes.forEach(function (ch) {
      var meta = this.getCellMeta(ch[0], ch[1]);
      if (meta._slot) { saveSlot(meta._slot); destroySlot(meta._slot); }
    }, this);
  });
  hot.addHook('afterChange', function (changes, source) {
    if (source === 'loadData') return;
    el._raw = readHot(el._hot, el._type);
    if (el.classList.contains('slot-root')) {
      S.root.$schema = el._raw.$schema;
      S.root.data = el._raw.data;
    } else {
      cascadeUp(el);
    }
  });

  if (type === 'array' || type === 'matrix') {
    hot.addHook('beforeRowMove', function () { clearChildren(el); });
    hot.addHook('afterRowMove', function () {
      el._raw = readHot(el._hot, el._type);
      cascadeUp(el);
    });
  }

  return hot;
}

// readData — pure data: 2D array + keys + type → parsed value
function readData(data, keys, type) {
  if (type === 'object') {
    var row = data[0] || [];
    var obj = {};
    for (var i = 0; i < keys.length; i++) {
      obj[keys[i]] = tryParse(row[i]);
    }
    return obj;
  }

  if (type === 'matrix') {
    var rows = data.map(function (r) {
      var end = r.length;
      while (end > 0 && (r[end - 1] == null || r[end - 1] === '')) end--;
      return r.slice(0, end).map(function (c) { return tryParse(c); });
    });
    while (rows.length > 0 && rows[rows.length - 1].length === 0) rows.pop();
    return rows;
  }

  if (type === 'array') {
    var rows = data.filter(function (r) {
      return r.some(function (c) { return c != null && c !== ''; });
    });
    if (keys && keys.length > 0) {
      return rows.map(function (r) {
        var o = {};
        for (var j = 0; j < keys.length; j++) {
          if (r[j] != null) o[keys[j]] = tryParse(r[j]);
        }
        return o;
      });
    }
    return rows.map(function (r) { return tryParse(r[0]); });
  }

  return tryParse(data[0] && data[0][0]);
}

// readHot — DOM adapter: extract data+keys from Hot, delegate to readData
function readHot(hot, type) {
  var data = hot.getData();
  var slot = findSlot(hot);
  var keys = (slot && slot._keys) || null;
  return readData(data, keys, type);
}

// ============================================================
// 6. Slot — lifecycle
// ============================================================
function saveSlot(el) {
  if (el._view === 'text')  el._raw = el._textTA.value;
  if (el._view === 'raw')   el._raw = tryParse(el._rawTA.value);
  if (el._view === 'table' && el._hot) el._raw = readHot(el._hot, el._type);
}

function cascadeUp(el) {
  if (el._parentHot && el._parentRow >= 0 && el._parentCol >= 0) {
    el._parentHot.setDataAtCell(el._parentRow, el._parentCol, JSON.stringify(el._raw), 'cascade');
  }
}

function destroySlot(el) {
  clearChildren(el);
  if (el._hot) {
    el._hot.destroy();
    el._hot = null;
  }
  if (el._parentHot && el._parentRow >= 0 && el._parentCol >= 0) {
    cascadeUp(el);
    var meta = el._parentHot.getCellMeta(el._parentRow, el._parentCol);
    meta._expanded = false;
    meta._slot = null;
    el._parentHot.render();
  }
  el.remove();
}

function clearChildren(el) {
  var kids = el._children.querySelectorAll(':scope > .slot');
  for (var i = kids.length - 1; i >= 0; i--) {
    saveSlot(kids[i]);
    destroySlot(kids[i]);
  }
}

// ============================================================
// 7. Cell — expand / collapse
// ============================================================
function expandCell(hot, row, col) {
  var meta = hot.getCellMeta(row, col);
  var raw = tryParse(hot.getDataAtCell(row, col));
  var type = typeOf(raw);
  var container = type === 'object' || type === 'array' || type === 'matrix';
  var parentSlot = findSlot(hot);
  var parentEl = parentSlot ? parentSlot._children : document.getElementById('app');

  var child = createSlot(parentEl, {
    path: cellPath(hot, row, col),
    raw: raw, type: type,
    parentHot: hot, parentRow: row, parentCol: col,
    showTable: container, noCollapse: false
  });

  meta._expanded = true;
  meta._slot = child;
  hot.render();

  if (container) switchView(child, 'table');
  else if (type === 'string') switchView(child, 'text');
  else switchView(child, 'raw');
}

function collapseCell(hot, row, col) {
  var meta = hot.getCellMeta(row, col);
  if (!meta._slot) return;
  saveSlot(meta._slot);
  destroySlot(meta._slot);
}

function findSlot(hot) {
  for (var parent = hot.rootElement.parentNode; parent && parent !== document.body; parent = parent.parentNode) {
    if (parent.classList && parent.classList.contains('slot')) return parent;
  }
  return null;
}

function cellPath(hot, row, col) {
  var slot = findSlot(hot);
  var base = slot._path;
  var keys = slot._keys;

  if (slot._type === 'matrix') return base.concat([[row, col]]);
  if (slot._type === 'array') {
    if (keys && keys.length > 0) return base.concat([row, keys[col]]);
    return base.concat([row]);
  }
  if (keys && keys.length > 0) return base.concat([keys[col]]);
  return base.concat([row]);
}

// ============================================================
// 8. Init
// ============================================================
var S = {};

function init() {
  S.root = { $schema: null, data: null };
  var root = createSlot(null, {
    isRoot: true, path: ['root'],
    raw: S.root, type: 'object',
    showTable: true, noCollapse: true
  });
  switchView(root, 'table');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
