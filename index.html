<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON TABLE EDITOR</title>
  <script src="https://cdn.jsdelivr.net/npm/handsontable@14.6.0/dist/handsontable.full.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@14.6.0/dist/handsontable.full.min.css">
  <style>
    body {
      overflow-x: auto;
      padding: 8px;
      font-family: monospace;
      font-size: 13px;
    }

    .slot {
      margin: 4px 0 4px 16px;
      border-left: 2px solid #ddd;
      padding-left: 12px;
    }

    .slot-root {
      margin: 0;
      border-left: 0;
      padding-left: 0;
    }

    .slot-bar {
      margin-bottom: 4px;
    }

    .slot-path {
      font-weight: bold;
      margin-right: 8px;
    }

    .btn {
      cursor: pointer;
      padding: 0 4px;
      background: #f0f0f0;
      font-family: monospace;
      user-select: none;
    }

    .btn.active {
      background: #333;
      color: #fff;
    }

    .cell-btn {
      float: right;
      position: relative;
      z-index: 1;
    }

    .slot-textarea {
      width: 480px;
      height: 160px;
      font: 13px monospace;
      resize: both;
      padding: 4px;
      box-sizing: border-box;
    }

    .handsontable td {
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <template id="slot-tmpl">
    <div class="slot">
      <div class="slot-bar">
        <span class="slot-path"></span>
        <span class="btn btn-table">TABLE</span>
        <span class="btn btn-json">JSON</span>
        <span class="btn btn-collapse">[-]</span>
      </div>
      <div class="slot-hot"></div>
      <textarea class="slot-textarea"></textarea>
      <div class="slot-children"></div>
    </div>
  </template>
  <script>
    var T = function (s) { try { return JSON.parse(s); } catch (e) { return s; } };
    function typeOf(v) { return v === null ? 'null' : Array.isArray(v) ? 'array' : typeof v; }
    function isObjOrArr(v) { var t = typeOf(v); return t === 'object' || t === 'array'; }

    function fmtJSON(v) {
      var t = typeOf(v);
      if (t === 'object') {
        var keys = Object.keys(v);
        return keys.length === 0 ? '{}' : `{\n${keys.map(function (k) { return `${JSON.stringify(k)}: ${JSON.stringify(v[k])}`; }).join(',\n')}\n}`;
      }
      if (t === 'array') {
        return v.length === 0 ? '[]' : `[\n${v.map(function (it) { return JSON.stringify(it); }).join(',\n')}\n]`;
      }
      return JSON.stringify(v);
    }

    // ============================================================
    // Cell renderer — value is JSON text string
    // ============================================================
    function cellRenderer(hot, td, row, col, prop, value, cellProperties) {
      Handsontable.renderers.TextRenderer.apply(this, arguments);
      if (value == null || value === '') { td.innerHTML = ''; return; }
      var display = value.length > 80 ? `${value.slice(0, 80)}\u2026` : value;
      var expanded = !!cellProperties._expanded;
      td.innerHTML = `<span class="btn cell-btn${expanded ? ' active' : ''}">${expanded ? '[-]' : '[+]'}</span>${display}`;
      if (value.length > 80) td.title = value;
      td.querySelector('.cell-btn').addEventListener('mousedown', function (e) {
        e.stopPropagation(); e.preventDefault();
        expanded ? collapse(hot, row, col) : expand(hot, row, col);
      });
    }

    // ============================================================
    // Hot factory
    // ============================================================
    function makeHot(div, cfg) {
      return new Handsontable(div, Object.assign({
        licenseKey: 'non-commercial-and-evaluation',
        width: 'auto', height: 'auto',
        manualColumnResize: true,
        outsideClickDeselects: false, contextMenu: false,
        editor: 'text'
      }, cfg));
    }

    // ============================================================
    // Slot
    // ============================================================
    function slot(parent, opts) {
      var t = document.getElementById('slot-tmpl');
      var d = t.content.cloneNode(true).querySelector('.slot');
      if (opts.isRoot) d.classList.add('slot-root');

      d.querySelector('.slot-path').textContent = opts.path || '';
      d._raw = opts.raw;        // parsed value
      d._type = opts.type;
      d._pRow = opts.pRow; d._pCol = opts.pCol; d._pHot = opts.pHot;
      d._multi = false;

      var bar = d.querySelector('.slot-bar');
      d._btnT = bar.querySelector('.btn-table');
      d._btnJ = bar.querySelector('.btn-json');
      d._btnX = bar.querySelector('.btn-collapse');

      d._btnT.style.display = opts.showTable ? '' : 'none';
      d._btnJ.style.display = '';  // always show JSON
      d._btnX.style.display = opts.noClose ? 'none' : '';

      d._btnT.addEventListener('mousedown', function (e) { e.preventDefault(); view(d, 'table'); });
      d._btnJ.addEventListener('mousedown', function (e) { e.preventDefault(); view(d, 'json'); });
      d._btnX.addEventListener('mousedown', function (e) { e.preventDefault(); saveSlot(d); destroySlot(d); });

      d._hot = null; d._view = '';
      d._hotDiv = d.querySelector('.slot-hot');
      d._ta = d.querySelector('.slot-textarea');
      d._kids = d.querySelector('.slot-children');

      (parent || document.getElementById('app')).appendChild(d);
      return d;
    }

    // ============================================================
    // View switch
    // ============================================================
    function view(d, v) {
      if (d._view === v) return;
      saveSlot(d);

      d._hotDiv.style.display = 'none';
      d._ta.style.display = 'none';
      if (d._hot) { d._hot.destroy(); d._hot = null; }

      if (v === 'table') {
        d._hotDiv.style.display = 'block';
        d._hot = buildHot(d);
      }
      if (v === 'json') {
        d._ta.style.display = 'block';
        d._ta.value = isObjOrArr(d._raw) ? fmtJSON(d._raw) : JSON.stringify(d._raw);
      }

      d._view = v;
      d._btnT.classList.toggle('active', v === 'table');
      d._btnJ.classList.toggle('active', v === 'json');
    }

    // ============================================================
    // Build Handsontable — cells store JSON text
    // ============================================================
    function buildHot(d) {
      var raw = d._raw, type = d._type, div = d._hotDiv;
      var h;

      if (d.classList.contains('slot-root')) {
        h = makeHot(div, {
          data: [[raw.$schema, raw.data]],
          colHeaders: ['$schema', 'data'],
          columns: [{ renderer: cellRenderer }, { renderer: cellRenderer }]
        });
        h.addHook('beforeCopy', function (data) { return data; });
        h.addHook('beforePaste', function (data) { return data; });
        h.addHook('afterChange', function (changes, source) {
      if (source === 'loadData') return;
      var r = this.getDataAtRow(0);
      S.root.$schema = r[0]; S.root.data = r[1];
        });
        return h;
      }

      if (type === 'object') {
        var keys = Object.keys(raw);
        h = makeHot(div, {
          data: [keys.map(function (k) { return JSON.stringify(raw[k]); })],
          colHeaders: keys,
          columns: keys.map(function () { return { renderer: cellRenderer }; })
        });
      } else if (type === 'array') {
        var objArr = raw.length > 0 && raw.every(function (it) { return it != null && typeof it === 'object' && !Array.isArray(it); });
        if (objArr) {
          d._multi = true;
          var allKeys = [];
          raw.forEach(function (it) {
            if (it) Object.keys(it).forEach(function (k) { if (allKeys.indexOf(k) === -1) allKeys.push(k); });
          });
          h = makeHot(div, {
            data: raw.map(function (it) {
              return allKeys.map(function (k) { return JSON.stringify(it && k in it ? it[k] : null); });
            }),
            colHeaders: allKeys, rowHeaders: true,
            columns: allKeys.map(function () { return { renderer: cellRenderer }; }),
            manualRowMove: true, minSpareRows: 3
          });
        } else {
          d._multi = false;
          var arrData = raw.length > 0
            ? raw.map(function (it) { return [JSON.stringify(it)]; })
            : [['']];  // at least one empty row for user to start
          h = makeHot(div, {
            data: arrData,
            colHeaders: [], rowHeaders: true,
            columns: [{ renderer: cellRenderer }],
            manualRowMove: true, minSpareRows: 3
          });
        }
      } else {
        h = makeHot(div, {
          data: [[JSON.stringify(raw)]],
          columns: [{ renderer: cellRenderer }]
        });
      }

      h.addHook('beforeCopy', function (data) { return data; });
      h.addHook('beforePaste', function (data) { return data; });
      h.addHook('afterChange', function (changes, source) {
        if (source === 'loadData') return;
        d._raw = readHot(d._hot, d._type, d._multi);
        up(d, d._raw);
      });

      if (type === 'array') {
        h.addHook('afterRowMove', function () {
          d._raw = readHot(d._hot, 'array', d._multi);
          up(d, d._raw);
        });
      }

      return h;
    }

    // ============================================================
    // Read hot → raw value (parse cell JSON text)
    // ============================================================
    function readHot(h, type, multi) {
      var data = h.getData();
      if (type === 'object') {
        var headers = h.getColHeader();
        var row = data[0] || [];
        var obj = {};
        for (var i = 0; i < headers.length; i++) {
          var key = headers[i].replace(/\s+\(.*\)$/, '');
          if (key) obj[key] = T(row[i]);
        }
        return obj;
      }
      if (type === 'array') {
        var rows = data.filter(function (r) { return r.some(function (c) { return c != null && c !== ''; }); });
        if (multi) {
          var hdrs = h.getColHeader();
          var keys = hdrs.map(function (s) { return s.replace(/\s+\(.*\)$/, ''); });
          return rows.map(function (r) {
            var o = {};
            for (var j = 0; j < keys.length; j++) { if (r[j] != null) o[keys[j]] = T(r[j]); }
            return o;
          });
        }
        return rows.map(function (r) { return T(r[0]); });
      }
      return T(data[0] && data[0][0]);
    }

    // ============================================================
    // Cascade up
    // ============================================================
    function up(d, raw) {
      if (d._pHot && d._pRow >= 0 && d._pCol >= 0) {
        d._pHot.setDataAtCell(d._pRow, d._pCol, JSON.stringify(raw), 'cascade');
      }
    }

    // ============================================================
    // Save / Destroy
    // ============================================================
    function saveSlot(d) {
      if (d._view === 'json') d._raw = T(d._ta.value);
      if (d._view === 'table' && d._hot) d._raw = readHot(d._hot, d._type, d._multi);
    }

    function destroySlot(d) {
      if (d._hot) { d._hot.destroy(); d._hot = null; }
      if (d._pHot && d._pRow >= 0 && d._pCol >= 0) {
        d._pHot.setDataAtCell(d._pRow, d._pCol, JSON.stringify(d._raw), 'cascade');
        var m = d._pHot.getCellMeta(d._pRow, d._pCol);
        m._expanded = false; m._slot = null;
        d._pHot.render();
      }
      d.remove();
    }

    // ============================================================
    // Expand / Collapse
    // ============================================================
    function expand(h, row, col) {
      var m = h.getCellMeta(row, col);
      var text = h.getDataAtCell(row, col);
      var raw = T(text);
      var t = typeOf(raw);
      var ps = findSlot(h);
      var pel = ps ? ps._kids : document.getElementById('app');
      var path = cellPath(h, row, col);

      var child = slot(pel, {
        path: path, raw: raw, type: t,
        pHot: h, pRow: row, pCol: col,
        showTable: isObjOrArr(raw), noClose: false
      });

      m._expanded = true; m._slot = child;
      h.render();

      view(child, isObjOrArr(raw) ? 'table' : 'json');
    }

    function collapse(h, row, col) {
      var m = h.getCellMeta(row, col);
      if (!m._slot) return;
      saveSlot(m._slot);
      destroySlot(m._slot);
    }

    function findSlot(h) {
      for (var e = h.rootElement.parentNode; e && e !== document.body; e = e.parentNode) {
        if (e.classList && e.classList.contains('slot')) return e;
      }
      return null;
    }

    function cellPath(h, row, col) {
      var s = findSlot(h);
      var base = s ? (s.querySelector('.slot-path').textContent || 'root') : 'root';
      var headers = h.getColHeader();
      var multi = s && s._multi;
      if (headers && col < headers.length) {
        var key = headers[col].replace(/\s+\(.*\)$/, '');
        return multi ? `${base}[${row}].${key}` : `${base}.${key}`;
      }
      return `${base}[${row}]`;
    }

    // ============================================================
    // Init
    // ============================================================
var S = { root: { $schema: 'null', data: 'null' } };

function init() {
  S.root = { $schema: 'null', data: 'null' };
  var r = slot(null, { isRoot: true, path: 'root', raw: S.root, type: 'object', showTable: true, noClose: true });
  view(r, 'table');
}

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
